    <script type="text/javascript">
        
        const _oldOnreadystatechange = document.onreadystatechange
        let _pageloadTask = -1
        document.onreadystatechange = function (e) {
            _oldOnreadystatechange && _oldOnreadystatechange.call(e)
            const showPage = () => {
                
                const app = document.querySelector(".app")
                if (app) {
                    app.style.visibility = ''
                }
            }

            
            const clearPageloadTask = () => {
                if (_pageloadTask != -1) {
                    clearTimeout(_pageloadTask)
                    _pageloadTask = -1
                }
            }
            clearPageloadTask()
            _pageloadTask = setTimeout(function () {
                clearPageloadTask()
                showPage()
            }, 400)

            if (document.readyState === 'complete') {
                if (window.i18next) {
                    
                    if (window.i18next.isInitialized) {
                        showPage()
                        clearPageloadTask()
                    }
                } else {
                    
                    showPage()
                    clearPageloadTask()
                }
            }
        }

        
        function checkInput() {
            const mUsername = document.querySelector('#username');
            const mPassword = document.querySelector('#password');
            const mSubmit = document.querySelector('#submit');
            if (!mUsername.value || !mPassword.value) {
                document.querySelector('#submit').disabled = true;
            } else {
                document.querySelector('#submit').disabled = false;
            }
        }
    </script>
